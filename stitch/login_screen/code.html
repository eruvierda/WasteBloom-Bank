<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Bank Sampah Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0d6dfd",
                        "background-light": "#f5f7f8",
                        "background-dark": "#0f1723",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem", 
                        "lg": "0.5rem", 
                        "xl": "0.75rem", 
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar hide for cleaner mobile look */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-800 dark:text-slate-100 h-screen w-full flex justify-center items-center overflow-hidden">
<!-- Mobile Device Container -->
<div class="relative w-full max-w-md h-full max-h-[900px] bg-white dark:bg-slate-900 shadow-2xl overflow-hidden flex flex-col">
<!-- Status Bar Placeholder (iOS Style) -->
<div class="w-full h-12 flex items-center justify-between px-6 pt-2 select-none">
<span class="text-sm font-semibold tracking-wide">9:41</span>
<div class="flex gap-1.5 items-center">
<span class="material-icons text-[18px]">signal_cellular_alt</span>
<span class="material-icons text-[18px]">wifi</span>
<span class="material-icons text-[18px] rotate-90">battery_full</span>
</div>
</div>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col px-8 pb-8 pt-4 overflow-y-auto no-scrollbar">
<!-- Hero / Branding Section -->
<div class="flex-1 flex flex-col items-center justify-center min-h-[200px] space-y-6">
<div class="relative group">
<!-- Logo Circle Container -->
<div class="w-24 h-24 rounded-2xl bg-primary/10 flex items-center justify-center transform group-hover:scale-105 transition-transform duration-300">
<!-- Abstract Leaf Icon representing eco-friendly banking -->
<span class="material-icons text-primary text-5xl">account_balance_wallet</span>
</div>
<!-- Decorative element -->
<div class="absolute -top-2 -right-2 w-8 h-8 bg-green-400 rounded-full flex items-center justify-center border-4 border-white dark:border-slate-900">
<span class="material-icons text-white text-xs font-bold">recycling</span>
</div>
</div>
<div class="text-center space-y-2">
<h1 class="text-3xl font-bold tracking-tight text-slate-900 dark:text-white">Bank Sampah</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm max-w-[240px] mx-auto leading-relaxed">
                        Turn your trash into cash. Manage your waste credits easily.
                    </p>
</div>
</div>
<!-- Login Form Section -->
<div class="flex-none space-y-6 w-full mb-8">
<!-- Welcome Text -->
<div class="text-left">
<h2 class="text-xl font-semibold text-slate-900 dark:text-white">Welcome Back!</h2>
<p class="text-slate-500 dark:text-slate-400 text-sm">Please sign in to continue.</p>
</div>
<form class="space-y-5" onsubmit="event.preventDefault();">
<!-- Email Input -->
<div class="space-y-1.5">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300 ml-1" for="email">Email Address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
<span class="material-icons text-slate-400 text-xl">mail_outline</span>
</div>
<input class="block w-full pl-11 pr-4 py-3.5 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all text-sm" id="email" name="email" placeholder="member@banksampah.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-1.5">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300 ml-1" for="password">Password</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
<span class="material-icons text-slate-400 text-xl">lock_outline</span>
</div>
<input class="block w-full pl-11 pr-12 py-3.5 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all text-sm" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3.5 flex items-center text-slate-400 hover:text-slate-600 dark:hover:text-slate-200" type="button">
<span class="material-icons text-xl">visibility_off</span>
</button>
</div>
</div>
<!-- Remember Me & Forgot Password -->
<div class="flex items-center justify-between pt-1">
<div class="flex items-center">
<input class="h-4 w-4 text-primary focus:ring-primary/50 border-slate-300 rounded cursor-pointer" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block text-sm text-slate-600 dark:text-slate-400 cursor-pointer" for="remember-me">
                                Remember me
                            </label>
</div>
<div class="text-sm">
<a class="font-medium text-primary hover:text-blue-700 transition-colors" href="#">
                                Forgot Password?
                            </a>
</div>
</div>
<!-- Login Button -->
<button class="w-full flex justify-center py-4 px-4 border border-transparent rounded-xl shadow-lg shadow-primary/30 text-sm font-semibold text-white bg-primary hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all active:scale-[0.98]" type="submit">
                        Login to Account
                    </button>
</form>
<!-- Social Login Separator -->
<div class="relative mt-6">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-slate-200 dark:border-slate-700"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-2 bg-white dark:bg-slate-900 text-slate-500">Or continue with</span>
</div>
</div>
<!-- Social Buttons Grid -->
<div class="grid grid-cols-2 gap-3 mt-6">
<button class="flex items-center justify-center px-4 py-2.5 border border-slate-200 dark:border-slate-700 rounded-lg shadow-sm bg-white dark:bg-slate-800 text-sm font-medium text-slate-700 dark:text-slate-200 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors" type="button">
<img alt="Google Logo" class="h-5 w-5 mr-2" data-alt="Google G logo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAGH2fMB850fSHF14AfNiVlMtVm11c7kHgmcKFYUDiOxk2AiVTFXmuLEUtEQ9iu8JUfNpmhZ8GuXSvyuqHZi6fICO771AaKDhEkWghN7tY6HjDlMzoxnT5n9QNZ6Qj7omJOfYQ7epsifF9oQHnl6pr8zRthh2DcdNNQXTFLQd0mSA1jS8oj0JtT3squLAkusaokqicI-fRNAIAZFNcqkiQ3WwZSx_CMkslAT-KWJXevfUl_IsCGqt09T2BgJ88pIon0euIe3Qf5Q40"/>
                        Google
                    </button>
<button class="flex items-center justify-center px-4 py-2.5 border border-slate-200 dark:border-slate-700 rounded-lg shadow-sm bg-white dark:bg-slate-800 text-sm font-medium text-slate-700 dark:text-slate-200 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors" type="button">
<img alt="Apple Logo" class="h-5 w-5 mr-2" data-alt="Apple logo silhouette" src="https://lh3.googleusercontent.com/aida-public/AB6AXuABWBhBI4WJpk5PBrJcEofiOGpoiTG8l5oM0E1BumGDTEvIhMGDp1gICptiuHMkdyG8ort8le6CiPRnzcj_2jEj8C2Edjp5cB904pRlFSQ9GKdJTD5UTyK-tKjWFjCbcxb3tsjQE_Rb6-Fay17eV74jn7_USqyjh5MV-gZt2cyGFxPKiuYVYUlggBowEE08rnWDGMcW6PjvVDzBsW2QM0pR97XCaY-mbIzZPdTn4E7a4GGD1E8EO1UAR9ay7PC9au60WsTfZ-frwPA"/>
                        Apple
                    </button>
</div>
</div>
</main>
<!-- Footer -->
<div class="flex-none p-6 text-center bg-slate-50 dark:bg-slate-800/50 border-t border-slate-100 dark:border-slate-800">
<p class="text-sm text-slate-600 dark:text-slate-400">
                Don't have an account? 
                <a class="font-semibold text-primary hover:text-blue-700 transition-colors ml-1" href="#">
                    Register Now
                </a>
</p>
</div>
<!-- Home Indicator (iOS Style) -->
<div class="h-5 w-full flex justify-center items-end pb-2">
<div class="w-32 h-1.5 bg-slate-300 dark:bg-slate-600 rounded-full"></div>
</div>
</div>
</body></html>
