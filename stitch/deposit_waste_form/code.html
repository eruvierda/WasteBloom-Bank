<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Deposit Waste Form - Bank Sampah</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0d6dfd",
                        "primary-dark": "#0b5ed7",
                        "background-light": "#f5f7f8",
                        "background-dark": "#0f1723",
                        "surface-light": "#ffffff",
                        "surface-dark": "#1e293b",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem", 
                        "2xl": "1rem",
                        "3xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        /* Hide scrollbar for clean mobile look */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-800 dark:text-slate-200 h-screen flex justify-center overflow-hidden">
<!-- Mobile Container -->
<div class="w-full max-w-md h-full bg-background-light dark:bg-background-dark flex flex-col relative shadow-2xl overflow-hidden">
<!-- Header / Navigation -->
<header class="pt-12 pb-4 px-6 flex justify-between items-center bg-surface-light dark:bg-surface-dark sticky top-0 z-10 border-b border-slate-100 dark:border-slate-800">
<button class="p-2 -ml-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors text-slate-600 dark:text-slate-300">
<span class="material-icons">arrow_back</span>
</button>
<h1 class="text-lg font-semibold text-slate-900 dark:text-white">Setor Sampah</h1>
<button class="p-2 -mr-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors text-slate-600 dark:text-slate-300">
<span class="material-icons">history</span>
</button>
</header>
<!-- Scrollable Content -->
<main class="flex-1 overflow-y-auto no-scrollbar pb-24 px-6 pt-6">
<!-- Balance Card -->
<div class="relative overflow-hidden rounded-2xl bg-gradient-to-br from-primary to-blue-600 p-6 text-white shadow-lg mb-8">
<!-- Abstract decorative circle -->
<div class="absolute -right-6 -top-6 h-32 w-32 rounded-full bg-white opacity-10 blur-2xl"></div>
<div class="absolute -left-6 -bottom-6 h-24 w-24 rounded-full bg-white opacity-10 blur-xl"></div>
<div class="relative z-10">
<div class="flex items-center gap-2 mb-2 opacity-90">
<span class="material-icons text-sm">account_balance_wallet</span>
<span class="text-sm font-medium tracking-wide">Saldo Saat Ini</span>
</div>
<div class="flex items-baseline gap-1">
<span class="text-lg font-medium opacity-80">Rp</span>
<span class="text-4xl font-bold tracking-tight">125.000</span>
</div>
<div class="mt-4 flex items-center gap-2 text-xs opacity-80 bg-white/10 w-fit px-3 py-1 rounded-full backdrop-blur-sm">
<span class="material-icons text-xs">trending_up</span>
<span>+Rp 15.000 minggu ini</span>
</div>
</div>
</div>
<!-- Form Container -->
<div class="space-y-6">
<!-- Waste Type Selector -->
<div class="space-y-2">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300 ml-1">Jenis Sampah</label>
<div class="relative">
<select class="block w-full rounded-xl border-slate-200 dark:border-slate-700 bg-surface-light dark:bg-surface-dark py-4 pl-4 pr-10 text-base focus:border-primary focus:ring-primary shadow-sm appearance-none cursor-pointer">
<option>Plastik PET (Botol Bening)</option>
<option>Kertas / Kardus</option>
<option>Logam (Kaleng)</option>
<option>Minyak Jelantah</option>
<option>Elektronik Kecil</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-500">
<span class="material-icons">expand_more</span>
</div>
</div>
</div>
<!-- Weight Input -->
<div class="space-y-2">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300 ml-1">Berat Total</label>
<div class="relative flex items-center">
<input class="block w-full rounded-xl border-slate-200 dark:border-slate-700 bg-surface-light dark:bg-surface-dark py-4 pl-4 pr-16 text-2xl font-bold text-slate-900 dark:text-white placeholder-slate-300 focus:border-primary focus:ring-primary shadow-sm" placeholder="0.0" step="0.1" type="number"/>
<div class="absolute right-4 flex items-center pointer-events-none">
<span class="text-slate-400 font-medium text-lg">kg</span>
</div>
</div>
<div class="flex gap-2 mt-2">
<button class="flex-1 py-2 text-sm font-medium text-primary bg-primary/10 rounded-lg hover:bg-primary/20 transition-colors">+0.5kg</button>
<button class="flex-1 py-2 text-sm font-medium text-primary bg-primary/10 rounded-lg hover:bg-primary/20 transition-colors">+1kg</button>
<button class="flex-1 py-2 text-sm font-medium text-primary bg-primary/10 rounded-lg hover:bg-primary/20 transition-colors">+5kg</button>
</div>
</div>
<!-- Estimation Box -->
<div class="bg-surface-light dark:bg-surface-dark border border-slate-100 dark:border-slate-700 rounded-xl p-5 shadow-sm">
<div class="flex justify-between items-center mb-3 pb-3 border-b border-slate-100 dark:border-slate-700 border-dashed">
<span class="text-sm text-slate-500 dark:text-slate-400">Harga per kg</span>
<span class="text-sm font-medium text-slate-800 dark:text-slate-200">Rp 3.000</span>
</div>
<div class="flex justify-between items-center">
<span class="text-sm font-medium text-slate-600 dark:text-slate-300">Estimasi Pendapatan</span>
<span class="text-xl font-bold text-green-600 dark:text-green-400">Rp 0</span>
</div>
</div>
<!-- Notes Field -->
<div class="space-y-2">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300 ml-1">Catatan (Opsional)</label>
<textarea class="block w-full rounded-xl border-slate-200 dark:border-slate-700 bg-surface-light dark:bg-surface-dark p-4 text-sm focus:border-primary focus:ring-primary shadow-sm resize-none" placeholder="Contoh: Botol sudah diremukkan, tutup dipisah..." rows="3"></textarea>
</div>
<!-- Spacer for scrolling above fixed button -->
<div class="h-8"></div>
</div>
</main>
<!-- Fixed Bottom Action -->
<div class="absolute bottom-0 left-0 right-0 p-6 bg-surface-light/80 dark:bg-surface-dark/90 backdrop-blur-md border-t border-slate-200/50 dark:border-slate-700/50 z-20">
<button class="w-full bg-primary hover:bg-primary-dark text-white font-semibold py-4 px-6 rounded-xl shadow-lg shadow-primary/30 transform transition-all active:scale-[0.98] flex items-center justify-center gap-2 group">
<span>Setor Sampah</span>
<span class="material-icons text-white/80 group-hover:translate-x-1 transition-transform text-sm">arrow_forward</span>
</button>
</div>
</div>
</body></html>
